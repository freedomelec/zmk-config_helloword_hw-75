name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    needs: [format]
    name: Build
    strategy:
      fail-fast: false
      matrix:
        board:
          - "hw75_dynamic@1.1"
          - "hw75_keyboard@1.1"
        include:
          - board: "hw75_dynamic@1.1"
            keymap: "hw75_dynamic.keymap"
          - board: "hw75_keyboard@1.1"
            keymap: "hw75_keyboard.keymap"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        continue-on-error: true
        env:
          cache-name: cache-zephyr-${{ env.zephyr_version }}-modules
        with:
          path: |
            modules/
            zephyr/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-

      - name: Set up build tools
        run: |
          apt-get update -y --fix-missing
          apt-get install -y --no-install-recommends python3-pip protobuf-compiler curl wget
          apt-get clean
          rm -rf /var/lib/apt/lists/*

          NODE_VERSION=18.20.8
          NODE_TAR=node-v${NODE_VERSION}-linux-x64.tar.xz
          wget --timeout=300 --tries=3 https://nodejs.org/dist/v${NODE_VERSION}/${NODE_TAR} -O /tmp/${NODE_TAR}
          tar -xJf /tmp/${NODE_TAR} -C /usr/local --strip-components=1
          rm /tmp/${NODE_TAR}

          node -v
          npm -v

          pip install --timeout=300 --retries=3 -U fonttools
          npm install --timeout=300 -g lv_font_conv
        timeout-minutes: 15

      - name: Prepare west
        run: |
          west init -l config
          west update --narrow -o=--depth=1 --timeout=300
          west zephyr-export
          pip install --timeout=300 --retries=3 -U -r zephyr/scripts/requirements.txt
          git config --global --add safe.directory $PWD
        timeout-minutes: 10

      - name: Build ${{ matrix.board }} (${{ matrix.keymap }})
        run: >
          west build -s zmk/app -b ${{ matrix.board }} -- -DZMK_CONFIG=${GITHUB_WORKSPACE}/config -DKEYMAP_FILE=${GITHUB_WORKSPACE}/config/${{ matrix.keymap }}

      - name: Rename artifacts
        run: |
          mkdir -p build/artifacts
          for ext in uf2 hex bin; do
            src="build/zephyr/zmk.${ext}"
            dst="build/artifacts/${{ matrix.board }}-zmk.${ext}"
            if [ -f "$src" ]; then
              cp "$src" "$dst"
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: build/artifacts/*

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Fmt Check
        uses: zmkfirmware/zmk-fmt-action@main

  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: firmware
          pattern: firmware-*
          merge-multiple: true

      - name: Prepare release notes
        id: release
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "RELEASE_BODY<<$EOF" >> "$GITHUB_OUTPUT"
          if [ -f .github/RELEASE_TEMPLATE.md ]; then
            sed "s/{{TAG}}/${{ github.ref_name }}/g" .github/RELEASE_TEMPLATE.md
          else
            echo "Firmware build for ${{ github.ref_name }}"
          fi
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: svenstaro/upload-release-action@v2
        with:
          file: firmware/*
          file_glob: true
          tag: ${{ github.ref_name }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          body: ${{ steps.release.outputs.RELEASE_BODY }}
          prerelease: true
          overwrite: true
