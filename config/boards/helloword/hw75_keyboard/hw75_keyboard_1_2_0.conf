# 核心必须开
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_KEY_TRAIL=y
CONFIG_WS2812_STRIP=y

# 锁定：默认全黑、只有踏雪痕
CONFIG_ZMK_RGB_UNDERGLOW_DEFAULT_EFFECT=-1    # 无底色
CONFIG_ZMK_RGB_UNDERGLOW_BRIGHTNESS=0        # 背景 0%
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y          # 开机就开

# 关闭所有其他特效（避免误切）
CONFIG_ZMK_RGB_UNDERGLOW_BREATHE=n
CONFIG_ZMK_RGB_UNDERGLOW_SPECTRUM=n
CONFIG_ZMK_RGB_UNDERGLOW_SWIRL=n
CONFIG_ZMK_RGB_UNDERGLOW_CYCLE=n

# 踏雪参数（可调）
CONFIG_ZMK_RGB_UNDERGLOW_KEY_TRAIL_DECAY=85
CONFIG_ZMK_RGB_UNDERGLOW_KEY_TRAIL_BRIGHTNESS=180
CONFIG_ZMK_RGB_UNDERGLOW_KEY_TRAIL_COLOR=-1  # -1=彩虹

# Caps 指示灯保留
CONFIG_ZMK_HID_INDICATORS=y